<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Ferretería</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Gestión de Inventario</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-xl font-semibold mb-4 text-gray-700">Añadir Producto Individual</h2>
    <form action="/admin" method="POST" enctype="multipart/form-data">
        <div class="mb-4">
            <label class="block text-gray-600">Nombre del Producto</label>
            <input type="text" name="nombre" class="w-full border rounded p-2" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-600">Precio</label>
            <input type="number" name="precio" step="0.01" class="w-full border rounded p-2" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-600">Stock Inicial</label>
            <input type="number" name="stock" class="w-full border rounded p-2" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-600">Foto del Producto</label>
            <input type="file" name="imagen_archivo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">
            Guardar Producto
        </button>
    </form>
</div>
                    </button>
                </form>
            </div>

            <div class="bg-blue-50 p-6 rounded-lg shadow-md border-2 border-dashed border-blue-400">
                <h2 class="text-xl font-semibold mb-4 text-blue-700">🚀 Carga Masiva (Excel/CSV)</h2>
                <p class="text-sm text-gray-600 mb-4">
                    Sube un archivo <b>.csv</b> con estas columnas exactas: <br>
                    <code class="bg-white px-1">nombre, precio, stock</code>
                </p>
                <form action="/importar" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <input type="file" name="archivo_excel" accept=".csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200" required>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700">
                        ¡Subir todo el Inventario!
                    </button>
                </form>
            </div>

        </div>

        <hr class="my-10">

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <h2 class="text-xl font-semibold p-4 bg-gray-50 border-b">Control de Inventario</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700">
                            <th class="p-4 border-b">Nombre del Producto</th>
                            <th class="p-4 border-b">Precio</th>
                            <th class="p-4 border-b">Stock</th>
                            <th class="p-4 border-b text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for producto in productos %}
                        <tr class="hover:bg-gray-50 border-b">
                            <form action="/editar/{{ producto.id }}" method="POST" class="flex">
                                <td class="p-2 border-b">
                                    <input type="text" name="nombre" value="{{ producto.nombre }}" 
                                           class="w-full border rounded px-2 py-1 text-sm focus:border-blue-500 outline-none">
                                </td>
                                <td class="p-2 border-b">
                                    <input type="number" name="precio" step="0.01" value="{{ producto.precio }}" 
                                           class="w-24 border rounded px-2 py-1 text-sm focus:border-blue-500 outline-none">
                                </td>
                                <td class="p-2 border-b">
                                    <input type="number" name="stock" value="{{ producto.stock }}" 
                                           class="w-20 border rounded px-2 py-1 text-sm focus:border-blue-500 outline-none">
                                </td>
                                <td class="p-2 border-b text-center">
                                    <div class="flex justify-center gap-2">
                                        <button type="submit" title="Guardar cambios" 
                                                class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700 transition shadow-sm text-xs font-bold">
                                            Guardar
                                        </button>
                                        
                                        <a href="/eliminar/{{ producto.id }}" 
                                           onclick="return confirm('¿Seguro que quieres borrar este producto?')"
                                           class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition shadow-sm text-xs font-bold">
                                            Borrar
                                        </a>
                                    </div>
                                </td>
                            </form>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="/" class="text-blue-600 font-bold hover:underline">← Volver a la Tienda Pública</a>
        </div>
    </div>

</body>
</html>
