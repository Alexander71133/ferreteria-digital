<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Ferretería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        
        <div class="bg-white p-8 rounded-2xl shadow-xl mb-10 border-t-4 border-blue-600">
            <h1 class="text-3xl font-extrabold mb-6 text-gray-800 flex items-center">
                <i class="fas fa-plus-circle mr-3 text-blue-600"></i>Nuevo Producto
            </h1>
            <form action="/admin/add" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nombre del Artículo</label>
                    <input type="text" name="nombre" placeholder="Ej. Martillo Galponero" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Precio de Venta</label>
                    <input type="number" step="0.01" name="precio" placeholder="0.00" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Stock Disponible</label>
                    <input type="number" name="stock" placeholder="Cantidad" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Foto del Producto</label>
                    <input type="file" name="foto" accept="image/*" capture="environment" class="w-full p-2 text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" required>
                </div>
                <button type="submit" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg transform hover:-translate-y-1">
                    <i class="fas fa-save mr-2"></i>Guardar en el Sistema
                </button>
            </form>
